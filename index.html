<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Palm Brick Breaker</title>
    <meta name="description" content="Palm-controlled brick breaker.">
    <meta property="og:title" content="Palm Brick Breaker">
    <meta property="og:description" content="Thumbs up to launch.">
    <meta property="og:type" content="website">
    <meta property="og:image" content="assets/siteOGImage3.png">
    <link rel="icon" href="assets/siteFavicon.png">
    <link rel="apple-touch-icon" href="assets/siteFavicon.png">
    <link rel="stylesheet" href="styles.css">
    <script defer src="vendor/mediapipe/hands.js"></script>
    <script defer src="game.js"></script>
</head>
<body>
    <main class="page-shell">
        <header class="hero">
            <div>
                <p class="eyebrow">Palm Brick Breaker</p>
                <h1>Thumbs up to start</h1>
            </div>
            <p id="tutorialStatus" class="hero-status">Loading hand tracking...</p>
        </header>

        <section class="game-layout" aria-label="Game layout">
            <section class="sidebar" aria-label="Game status">
                <div class="hud" aria-live="polite">
                    <div class="hud-card">
                        <span class="hud-label">Lives</span>
                        <span id="livesElement" class="hearts-row" aria-label="3 lives"></span>
                    </div>
                    <div class="hud-card">
                        <span class="hud-label">Level</span>
                        <span id="levelElement" class="hud-value">1</span>
                    </div>
                    <div class="hud-card">
                        <span class="hud-label">Score</span>
                        <span id="scoreElement" class="hud-value">0</span>
                    </div>
                    <div class="hud-card">
                        <span class="hud-label">Tracking</span>
                        <span id="trackingStatus" class="status-pill status-loading">Loading</span>
                    </div>
                </div>

                <section class="camera-panel" aria-label="Camera preview">
                    <div class="camera-head">
                        <h2>Camera</h2>
                        <p id="gestureStatus">Show your hand</p>
                    </div>
                    <div class="camera-frame">
                        <video id="videoElement" playsinline muted aria-label="Hand tracking camera preview"></video>
                    </div>
                    <div class="tutorial-meter" aria-hidden="true">
                        <div id="palmIndicator" class="tutorial-meter-fill"></div>
                    </div>
                    <p class="micro-copy">Move your palm left and right. Give a thumbs up to launch.</p>
                </section>

                <div class="control-row">
                    <button id="restartButton" class="button button-secondary" type="button">Restart</button>
                    <button id="toggleLeaderboardButton" class="button button-ghost" type="button" aria-expanded="false" aria-controls="leaderboardPanel">
                        Scores
                    </button>
                </div>

                <section id="leaderboardPanel" class="leaderboard-panel hidden" aria-labelledby="leaderboardTitle">
                    <div class="leaderboard-head">
                        <h2 id="leaderboardTitle">Leaderboard</h2>
                    </div>
                    <div id="leaderboardContent" class="leaderboard-content"></div>
                </section>
            </section>

            <section class="game-panel" aria-label="Game panel">
                <div class="game-stage">
                    <canvas id="gameCanvas" aria-label="Palm Brick Breaker game board"></canvas>
                    <div id="pauseOverlay" class="stage-overlay hidden" role="status" aria-live="assertive">
                        <h2>Tracking paused</h2>
                        <p>Show your palm again to continue.</p>
                    </div>
                </div>
            </section>
        </section>
    </main>

    <dialog id="gameOverDialog" class="game-over-dialog">
        <form id="saveScoreForm" class="dialog-card" method="dialog">
            <h2>Run Over</h2>
            <div class="result-grid">
                <span class="result-label">Level</span>
                <span id="finalLevel">1</span>
                <span class="result-label">Score</span>
                <span id="finalScore">0</span>
            </div>
            <label class="input-group" for="playerNameInput">
                <span>Name</span>
                <input id="playerNameInput" name="playerName" type="text" maxlength="20" placeholder="Player">
            </label>
            <div class="dialog-actions">
                <button id="saveScoreButton" class="button button-primary" type="submit">Save</button>
                <button id="skipScoreButton" class="button button-ghost" type="button">Skip</button>
            </div>
        </form>
    </dialog>
</body>
</html>
