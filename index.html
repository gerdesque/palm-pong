<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Palm-Pong</title>
    <meta name="description" content="Brick-Breaker mit Handsteuerung.">
    <meta property="og:title" content="Palm-Pong">
    <meta property="og:description" content="Daumen hoch zum Start.">
    <meta property="og:type" content="website">
    <meta property="og:image" content="assets/siteOGImage.png">
    <link rel="icon" href="assets/siteFavicon.png">
    <link rel="apple-touch-icon" href="assets/siteFavicon.png">
    <link rel="stylesheet" href="styles.css">
    <script defer src="vendor/mediapipe/hands.js"></script>
    <script defer src="game.js"></script>
</head>
<body>
    <main class="page-shell">
        <header class="hero">
            <div>
                <h1 class="eyebrow">Palm-Pong</h1>
                <h2>Daumen hoch zum Start</h2>
            </div>
            <p id="tutorialStatus" class="hero-status">Handerkennung lädt...</p>
        </header>

        <section class="game-layout" aria-label="Game layout">
            <section class="sidebar" aria-label="Spielstatus">
                <div class="hud" aria-live="polite">
                    <div class="hud-card">
                        <span class="hud-label">Leben</span>
                        <span id="livesElement" class="hearts-row" aria-label="3 Leben"></span>
                    </div>
                    <div class="hud-card">
                        <span class="hud-label">Level</span>
                        <span id="levelElement" class="hud-value">1</span>
                    </div>
                    <div class="hud-card">
                        <span class="hud-label">Punkte</span>
                        <span id="scoreElement" class="hud-value">0</span>
                    </div>
                    <div class="hud-card">
                        <span class="hud-label">Tracking</span>
                        <span id="trackingStatus" class="status-pill status-loading">Lädt</span>
                    </div>
                </div>

                <section class="camera-panel" aria-label="Kameravorschau">
                    <div class="camera-head">
                        <h2>Kamera</h2>
                        <p id="gestureStatus">Hand zeigen</p>
                    </div>
                    <div class="camera-frame">
                        <video id="videoElement" playsinline muted aria-label="Kameravorschau für Handtracking"></video>
                    </div>
                    <div class="tutorial-meter" aria-hidden="true">
                        <div id="palmIndicator" class="tutorial-meter-fill"></div>
                    </div>
                    <p class="micro-copy">Hand nach links und rechts bewegen. Mit Daumen hoch starten.</p>
                </section>

                <div class="control-row">
                    <button id="restartButton" class="button button-secondary" type="button">Neu starten</button>
                    <button id="toggleLeaderboardButton" class="button button-ghost" type="button" aria-expanded="false" aria-controls="leaderboardPanel">
                        Bestenliste
                    </button>
                </div>

                <section id="leaderboardPanel" class="leaderboard-panel hidden" aria-labelledby="leaderboardTitle">
                    <div class="leaderboard-head">
                        <h2 id="leaderboardTitle">Bestenliste</h2>
                    </div>
                    <div id="leaderboardContent" class="leaderboard-content"></div>
                </section>
            </section>

            <section class="game-panel" aria-label="Spielfeld">
                <div class="game-stage">
                    <canvas id="gameCanvas" aria-label="Spielfeld von Hand-Mauerknacker"></canvas>
                    <div id="pauseOverlay" class="stage-overlay hidden" role="status" aria-live="assertive">
                        <h2>Tracking pausiert</h2>
                        <p>Zeig deine Hand erneut, um weiterzuspielen.</p>
                    </div>
                </div>
            </section>
        </section>
    </main>

    <dialog id="gameOverDialog" class="game-over-dialog">
        <form id="saveScoreForm" class="dialog-card" method="dialog">
            <h2>Runde vorbei</h2>
            <div class="result-grid">
                <span class="result-label">Level</span>
                <span id="finalLevel">1</span>
                <span class="result-label">Punkte</span>
                <span id="finalScore">0</span>
            </div>
            <label class="input-group" for="playerNameInput">
                <span>Name</span>
                <input id="playerNameInput" name="playerName" type="text" maxlength="20" placeholder="Spieler">
            </label>
            <div class="dialog-actions">
                <button id="saveScoreButton" class="button button-primary" type="submit">Speichern</button>
                <button id="skipScoreButton" class="button button-ghost" type="button">Überspringen</button>
            </div>
        </form>
    </dialog>
</body>
</html>
